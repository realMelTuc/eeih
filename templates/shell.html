<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEIH — Exploration Intel Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/eeih.css">
</head>
<body>
<div class="shell">

    <!-- ── Sidebar ── -->
    <nav class="sidebar" id="sidebar">
        <div class="brand">
            <div>EEIH<small>Exploration Intel Hub</small></div>
            <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse">&#x2630;</button>
        </div>
        <div class="nav-datetime" id="nav-datetime"></div>

        <div class="nav-section">Overview</div>
        <a class="nav-link" data-url="/dashboard/">Dashboard</a>

        <div class="nav-section">Runs</div>
        <a class="nav-link" data-url="/runs/new/">Log Run</a>
        <a class="nav-link" data-url="/runs/">All Runs</a>

        <div class="nav-section">Analysis</div>
        <a class="nav-link" data-url="/regions/">Regions</a>
        <a class="nav-link" data-url="/loot/">Loot Analysis</a>

        <div class="sidebar-footer">
            <span class="footer-tag">EVE Online</span>
            <span class="footer-tag">Explorer</span>
        </div>
    </nav>

    <!-- ── Main wrap ── -->
    <div class="main-wrap" id="main-wrap">
        <header class="topbar">
            <button class="topbar-toggle" id="topbar-toggle" title="Toggle sidebar">&#x2630;</button>
            <div class="topbar-title" id="topbar-title">EEIH</div>
            <div class="topbar-right">
                <a class="topbar-btn amber" data-url="/runs/new/" id="btn-log-run">+ Log Run</a>
            </div>
        </header>
        <main class="page-body" id="main-panel">
            <div class="loading">Loading&#8230;</div>
        </main>
    </div>
</div>

<div id="eeih-toast" hidden></div>

<script>
// ─── Panel loader ─────────────────────────────────────────────────────────────
function loadPanel(url) {
    history.pushState({ url: url }, '', url);
    sessionStorage.setItem('eeihLastPanel', url);
    setActiveNav(url);
    updateTopbarTitle(url);

    fetch(url)
        .then(function(r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(function(html) {
            var tmp = document.createElement('div');
            tmp.innerHTML = html;
            var scripts = [];
            tmp.querySelectorAll('script').forEach(function(s) {
                scripts.push({ src: s.src, content: s.textContent });
                s.remove();
            });
            document.getElementById('main-panel').innerHTML = tmp.innerHTML;
            scripts.forEach(function(si) {
                try {
                    var ns = document.createElement('script');
                    if (si.src) { ns.src = si.src; } else { ns.textContent = si.content; }
                    document.body.appendChild(ns);
                } catch(e) { console.error('Script error:', e); }
            });
        })
        .catch(function(err) {
            document.getElementById('main-panel').innerHTML =
                '<p style="color:#ef4444;padding:40px;font-family:Geist Mono,monospace">Error: ' + err.message + '</p>';
        });
}

var URL_TITLES = {
    '/dashboard/': 'Dashboard',
    '/runs/':      'All Runs',
    '/runs/new/':  'Log Run',
    '/regions/':   'Regions',
    '/loot/':      'Loot Analysis',
};
function updateTopbarTitle(url) {
    var el = document.getElementById('topbar-title');
    if (!el) return;
    if (URL_TITLES[url]) { el.textContent = URL_TITLES[url]; return; }
    if (url.match(/^\/runs\/\d+\//)) { el.textContent = 'Run Detail'; return; }
    el.textContent = 'EEIH';
}

function setActiveNav(url) {
    document.querySelectorAll('[data-url]').forEach(function(a) {
        var u = a.dataset.url;
        var isActive = u === url || (url.startsWith('/runs/') && url !== '/runs/new/' && u === '/runs/');
        a.classList.toggle('active', isActive);
    });
}

// Nav link clicks
document.querySelectorAll('[data-url]').forEach(function(el) {
    el.addEventListener('click', function(e) {
        e.preventDefault();
        loadPanel(el.dataset.url);
    });
});

// Browser back/forward
window.addEventListener('popstate', function(e) {
    if (e.state && e.state.url) loadPanel(e.state.url);
});

// ─── Sidebar toggle ───────────────────────────────────────────────────────────
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
    document.getElementById('main-wrap').classList.toggle('full-width');
}
document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
document.getElementById('topbar-toggle').addEventListener('click', toggleSidebar);

// ─── UTC datetime ─────────────────────────────────────────────────────────────
function updateDatetime() {
    var el = document.getElementById('nav-datetime');
    if (!el) return;
    var now = new Date();
    var opts = { timeZone: 'UTC', weekday: 'short', month: 'short', day: 'numeric',
                 hour: '2-digit', minute: '2-digit', hour12: false };
    el.textContent = now.toLocaleString('en-US', opts) + ' UTC';
}
updateDatetime();
setInterval(updateDatetime, 60000);

// ─── Toast ───────────────────────────────────────────────────────────────────
window.eeihToast = function(msg, type) {
    var el = document.getElementById('eeih-toast');
    var colors = {
        success: ['rgba(34,197,94,0.95)',  '#0d1117'],
        error:   ['rgba(239,68,68,0.95)',  '#fff'],
        info:    ['rgba(0,212,170,0.92)',   '#0d1117'],
        warn:    ['rgba(240,160,32,0.95)',  '#0d1117'],
    };
    var c = colors[type] || colors.info;
    el.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;padding:12px 20px;' +
        'border-radius:4px;font-size:12px;font-family:Geist Mono,monospace;max-width:420px;' +
        'background:' + c[0] + ';color:' + c[1];
    el.textContent = msg;
    el.hidden = false;
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(function() {
        el.style.opacity = '0';
        setTimeout(function() { el.hidden = true; }, 300);
    }, 3400);
};

// ─── ISK formatter (global helper) ────────────────────────────────────────────
window.fmtISK = function(v) {
    var n = parseFloat(v) || 0;
    if (n >= 1e9)  return (n / 1e9).toFixed(2)  + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(2)  + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1)  + 'K';
    return n.toFixed(0);
};
window.fmtISKFull = function(v) {
    return (parseFloat(v) || 0).toLocaleString('en-US', { maximumFractionDigits: 0 }) + ' ISK';
};
window.esc = function(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
};
window.secBadge = function(s) {
    return '<span class="badge badge-' + esc(s || 'NS') + '">' + esc(s || 'NS') + '</span>';
};
window.typeBadge = function(t) {
    return '<span class="badge badge-' + esc(t || 'relic') + '">' + esc(t || 'relic') + '</span>';
};
window.diffBadge = function(d) {
    return '<span class="badge badge-' + esc(d || 'standard') + '">' + esc(d || 'std') + '</span>';
};
window.catBadge = function(c) {
    return '<span class="badge badge-' + esc(c || 'misc') + '">' + esc(c || 'misc') + '</span>';
};
window.fmtDate = function(d) {
    if (!d) return '\u2014';
    return d.slice(0, 10);
};
window.fmtRunTime = function(s) {
    if (!s) return '\u2014';
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + 'm ' + String(sec).padStart(2, '0') + 's';
};

// ─── Initial panel load ───────────────────────────────────────────────────────
(function() {
    var path = window.location.pathname;
    var url = (path && path !== '/' && path !== '/app')
        ? path
        : (sessionStorage.getItem('eeihLastPanel') || '/dashboard/');
    loadPanel(url);
})();
</script>
</body>
</html>
